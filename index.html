<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Navbar</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  nav {
    background: black;
    padding: 10px 20px;
    
    
    
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 50px;
    margin: 0;
    padding: 0;
    margin-left: 50px;
  }

  nav a {
    color: white;
    text-decoration: none;
    font-size: 16px;
  }

  nav a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

</body>
</html>
